[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]
  included_files = ["public/**"]

# 保护后台页面，防止直接访问静态文件
[[redirects]]
  from = "/admin-panel.html"
  to = "/admin"
  status = 302
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# 后台路由：交给 serverless function 处理密码验证
[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/api"
  status = 200

# 静态文件直接服务（图片、HTML等）
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
